pipeline:
  name: pdf-process-pipeline
  identifier: pdfprocesspipeline
  projectIdentifier: default_project
  orgIdentifier: default
  description: CI process for pdf process
  tags: {}
  properties:
    ci:
      codebase:
        repoName: pdf-processing-service
        build: <+input>
  stages:
    - stage:
        name: build-pdf
        identifier: buildpdf
        description: build stage of pdf-process
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: pdfprocessork8scluster
              namespace: pdf-pro-k8s
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    connectorRef: pdfservice
                    image: python:3.12-slim
                    shell: Bash
                    command: echo "Harness CI is fast"
                  description: test run
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: pdfservice
                    repo: dtacci/pdf-service
                    tags:
                      - <+codebase.commitSha>
                    buildArgs:
                      APP_VERSION: 1.0.0
                      GIT_SHA: <+codebase.commitSha>
                    baseImageConnectorRefs:
                      - pdfservice
