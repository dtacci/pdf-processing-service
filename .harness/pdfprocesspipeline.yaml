pipeline:
  name: pdf-process-pipeline
  identifier: pdfprocesspipeline
  projectIdentifier: default_project
  orgIdentifier: default
  description: CI process for pdf process
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: pdfprocessor
        repoName: pdf-processing-service
        build: <+input>
  stages:
    - stage:
        name: build-pdf
        identifier: buildpdf
        description: build stage of pdf-process
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: pdfprocessork8scluster
              namespace: pdf-pro-k8s
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Run_1
                  identifier: Run_1
                  spec:
                    connectorRef: pdfservice
                    image: python:3.12-slim
                    shell: Bash
                    command: echo "Harness CI is fast"
                  description: test run
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: pdfservice
                    repo: dtacci/pdf-service
                    tags:
                      - <+codebase.commitSha>
                    buildArgs:
                      APP_VERSION: 1.0.0
                      GIT_SHA: <+codebase.commitSha>
                      BUILD_TIME: <+pipeline.startTs>
                    baseImageConnectorRefs:
                      - pdfservice
    - stage:
        name: pdf-process-deploy
        identifier: pdfprocessdeploy
        description: pdf-process-deployment
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: pdfprocessorCDservice
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: pdfdev
            gitBranch: main
            deployToAll: false
            infrastructureDefinitions:
              - identifier: pdfprocessork8s
          execution:
            steps:
              - stepGroup:
                  name: Canary Deployment
                  identifier: canaryDeployment
                  steps:
                    - step:
                        name: Canary Deployment
                        identifier: canaryDeployment
                        type: K8sCanaryDeploy
                        timeout: 10m
                        spec:
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                          skipDryRun: false
                    - step:
                        name: Canary Delete
                        identifier: canaryDelete
                        type: K8sCanaryDelete
                        timeout: 10m
                        spec: {}
              - stepGroup:
                  name: Primary Deployment
                  identifier: primaryDeployment
                  steps:
                    - step:
                        name: Rolling Deployment
                        identifier: rollingDeployment
                        type: K8sRollingDeploy
                        timeout: 10m
                        spec:
                          skipDryRun: false
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollbackCanaryDelete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rollingRollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
