apiVersion: v1
kind: Service
metadata:
  name: pdf-service
  labels:
    app: pdf-service
spec:
  type: ClusterIP
  selector:
    app: pdf-service
  ports:
    - name: http
      port: 80
      targetPort: http
# To reach the service from outside the cluster during a local demo, either:
#   kubectl port-forward svc/pdf-service 8080:80
# or switch `type:` to NodePort and add a `nodePort:` under the port entry.
